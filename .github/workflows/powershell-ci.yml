name: PowerShell CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install PowerShell
      run: |
        sudo apt-get update
        sudo apt-get install -y powershell

    - name: Run script check
      run: |
        pwsh -Command "Get-ChildItem *.ps1 | ForEach-Object { pwsh -NoProfile -Command \".\$_\" }"
